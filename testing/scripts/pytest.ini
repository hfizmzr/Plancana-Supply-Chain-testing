[pytest]
testpaths = .
python_files = test_uc5_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider
markers =
    scenario: End-to-end scenario tests (full user journey)
    smoke: Quick smoke tests for CI
    slow: Tests that take longer than 10 seconds
